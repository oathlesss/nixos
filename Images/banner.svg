<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <linearGradient id="flake-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89b4fa"/>
      <stop offset="100%" style="stop-color:#cba6f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="100" x2="900" y2="100" stroke="#313244" stroke-width="0.5" opacity="0.5"/>
  <line x1="450" y1="0" x2="450" y2="200" stroke="#313244" stroke-width="0.5" opacity="0.5"/>

  <!-- NixOS snowflake (simplified geometric) centered left -->
  <g transform="translate(120, 100)">
    <!-- 6 arms of the snowflake -->
    <g fill="url(#flake-grad)">
      <!-- Vertical arm -->
      <rect x="-5" y="-52" width="10" height="104" rx="3"/>
      <!-- Diagonal arm 1 -->
      <rect x="-5" y="-52" width="10" height="104" rx="3" transform="rotate(60)"/>
      <!-- Diagonal arm 2 -->
      <rect x="-5" y="-52" width="10" height="104" rx="3" transform="rotate(120)"/>
      <!-- Center hex -->
      <circle cx="0" cy="0" r="10" fill="#cba6f7"/>
      <!-- Arm tips -->
      <circle cx="0" cy="-52" r="5" fill="#89b4fa"/>
      <circle cx="0" cy="52" r="5" fill="#89b4fa"/>
      <circle cx="45" cy="-26" r="5" fill="#89b4fa" transform="rotate(0)"/>
      <circle cx="45" cy="26" r="5" fill="#89b4fa" transform="rotate(0)"/>
      <circle cx="-45" cy="-26" r="5" fill="#89b4fa" transform="rotate(0)"/>
      <circle cx="-45" cy="26" r="5" fill="#89b4fa" transform="rotate(0)"/>
    </g>
  </g>

  <!-- Title -->
  <text x="240" y="88" font-family="monospace, 'Courier New'" font-size="52" font-weight="bold" fill="#cdd6f4" letter-spacing="2">nixos</text>

  <!-- Subtitle -->
  <text x="242" y="120" font-family="monospace, 'Courier New'" font-size="15" fill="#6c7086" letter-spacing="1">NixOS · Asahi Linux · Apple Silicon · Niri WM</text>

  <!-- Decorative accent line -->
  <rect x="240" y="130" width="380" height="2" fill="url(#flake-grad)" rx="1" opacity="0.6"/>

  <!-- Tag pills -->
  <g transform="translate(242, 148)">
    <!-- flakes -->
    <rect x="0" y="0" width="72" height="22" rx="11" fill="#313244"/>
    <text x="36" y="15" font-family="monospace" font-size="11" fill="#89b4fa" text-anchor="middle">flakes</text>
    <!-- home-manager -->
    <rect x="80" y="0" width="120" height="22" rx="11" fill="#313244"/>
    <text x="140" y="15" font-family="monospace" font-size="11" fill="#a6e3a1" text-anchor="middle">home-manager</text>
    <!-- aarch64 -->
    <rect x="208" y="0" width="80" height="22" rx="11" fill="#313244"/>
    <text x="248" y="15" font-family="monospace" font-size="11" fill="#cba6f7" text-anchor="middle">aarch64</text>
  </g>

  <!-- Corner accent dots -->
  <circle cx="16" cy="16" r="3" fill="#313244"/>
  <circle cx="884" cy="16" r="3" fill="#313244"/>
  <circle cx="16" cy="184" r="3" fill="#313244"/>
  <circle cx="884" cy="184" r="3" fill="#313244"/>
</svg>
